<!DOCTYPE html>
<html>
<head>
    <title>Add Habit</title>

    <style>
        body {
            font-family: Arial;
            background: #f4f6f9;
            text-align: center;
        }

        .box {
            background: white;
            padding: 20px;
            margin: 100px auto;
            width: 300px;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        input {
            width: 90%;
            padding: 10px;
            margin: 10px 0;
        }

        button {
            padding: 10px;
            width: 100%;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 6px;
        }
    </style>
</head>

<body>

<div class="box">
    <h2>Add Habit</h2>

    <form method="POST">
        <input type="text" name="name" placeholder="Habit name" required>
        <button type="submit">Add</button>
    </form>

</div>

</body>
</html>
